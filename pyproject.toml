[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "pnfl-pdbtoexcel"
version = "0.1.0"
description = "Exports the contents of a WinLogStats database (.pdb) into an Excel worksheet (.xlsm)"
authors = [{name = "Brian J"}]
readme = "README.md"
requires-python = ">=3.10"
dependencies = ["xlsxwriter", "fbpro98-gameplan", "pnfl-playpool"]

[project.scripts]
pdbtoexcel = "pnfl_pdbtoexcel:run"

[project.optional-dependencies]
dev = [
    "pytest",
    "ruff"
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
pnfl_pdbtoexcel = ["*.bin"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 100

[tool.ruff.format]
quote-style = "double"
