[Settings]
# Path to the directory containing the play files.
# Default is C:\SIERRA\FbPro98\PNFL
PlayPath = E:\SIERRA\FbPro98\PNFL\

# Include combined stats across all teams for each play.
# Default is Yes.
CalculateTotalStats = Yes

# Include percentage columns (Int %, Sack %, TD %, etc.).
# Default is Yes.
CalculatePercentages = Yes


[CategoryOrder]
# Order of play categories in the spreadsheet. One category per line.
# VBA sort macros use this order. Reorder as needed.
RunCategories =
    RL
    RM
    RR
    GLR
PassCategories =
    PSL
    PSM
    PSR
    PML
    PMM
    PMR
    PLR
    PRD
    GLP
DefenseCategories =
    RunLeft
    RunMiddle
    RunRight
    RunDazzle
    PassShort
    PassMedium
    PassLong
    PassDazzle
    GLrun
    GLpass
